<style>
  :root{
    --sea:#0E2A33; --sea2:#143C47; --deep:#0A2129;
    --sand:#F5F1E9; --paper:#FBF9F4; --line:#E4DDCF;

    --ink:#16262B; --mute:#6B7A7E; --muteLt:#93A0A2;
    --botbg:#FFFFFF; --userbg:#143C47;
    --shadow:0 30px 80px -30px rgba(8,28,34,.55);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% 0%, #6a97a1 0%, #3a6b74 32%, #1c4650 60%, #0e2a33 100%);
    display:flex; align-items:center; justify-content:center;
    padding:28px 16px; min-height:100vh;
  }
  /* faint site hint behind the widget */
  body:before{
    content:""; position:fixed; inset:0; pointer-events:none;
    background:
      linear-gradient(transparent 62%, rgba(8,26,32,.35)),
      repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,.015) 78px 79px);
    z-index:0;
  }
  .stage{position:relative; z-index:1; width:100%; max-width:412px}
  .tagline{
    text-align:center; color:#e8f0ef; margin-bottom:14px; font-size:13px; letter-spacing:.14em;
    text-transform:uppercase; opacity:.85;
  }
  .tagline b{color:#fff; font-weight:600}

  .widget{
    background:var(--paper); border-radius:22px; overflow:hidden;
    box-shadow:var(--shadow); display:flex; flex-direction:column;
    height:660px; max-height:82vh; border:1px solid rgba(255,255,255,.4);
  }

  /* header */
  .head{background:linear-gradient(160deg,var(--sea2),var(--deep)); color:#fff; padding:15px 16px 13px; position:relative}
  .head .row{display:flex; align-items:center; gap:11px}
  .mono{
    width:42px; height:42px; border-radius:12px; flex:0 0 42px;
    background:linear-gradient(150deg,var(--brass-lt),var(--brass));
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-weight:700; font-size:24px; color:#2a1c08;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .brand{flex:1; min-width:0}
  .brand .name{font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:600; letter-spacing:.02em; line-height:1}
  .brand .sub{font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:#a9c2c4; margin-top:3px}
  .status{display:flex; align-items:center; gap:6px; margin-top:9px; font-size:12px; color:#cfe0df}
  .dot{width:8px; height:8px; border-radius:50%; background:#5bd6a0; box-shadow:0 0 0 0 rgba(91,214,160,.7); animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,214,160,.6)}70%{box-shadow:0 0 0 7px rgba(91,214,160,0)}100%{box-shadow:0 0 0 0 rgba(91,214,160,0)}}
  .clock{position:absolute; top:15px; right:15px; text-align:right; font-size:11px; color:#9fb6b8; line-height:1.35}
  .clock .t{font-size:15px; color:#fff; font-variant-numeric:tabular-nums; letter-spacing:.02em}
  .clock .moon{opacity:.85}

  /* language tabs */
  .langs{display:flex; gap:5px; margin-top:12px}
  .langs button{
    flex:1; background:rgba(255,255,255,.08); color:#dbe7e6; border:1px solid rgba(255,255,255,.12);
    border-radius:8px; padding:6px 0; font-family:inherit; font-size:11px; font-weight:600; letter-spacing:.08em;
    cursor:pointer; transition:.18s;
  }
  .langs button:hover{background:rgba(255,255,255,.16)}
  .langs button.on{background:var(--brass); border-color:var(--brass); color:#241703}

  /* messages */
  .msgs{flex:1; overflow-y:auto; padding:18px 16px 8px; background:
      linear-gradient(var(--paper),var(--paper)) padding-box,
      radial-gradient(140% 60% at 50% 0,rgba(62,142,138,.06),transparent 60%);
  }
  .msgs::-webkit-scrollbar{width:7px}
  .msgs::-webkit-scrollbar-thumb{background:#d8cfbd; border-radius:8px}
  .m{display:flex; margin-bottom:11px; animation:rise .34s cubic-bezier(.2,.7,.3,1)}
  @keyframes rise{from{opacity:0; transform:translateY(9px)}to{opacity:1; transform:none}}
  .m.bot{justify-content:flex-start}
  .m.me{justify-content:flex-end}

  .typing span:nth-child(3){animation-delay:.4s}

  .card .photo .area{color:#fff; font-size:11px; letter-spacing:.14em; text-transform:uppercase; text-shadow:0 1px 6px rgba(0,0,0,.4); font-weight:600}
  .card .photo .tag{position:absolute; top:9px; right:9px; background:rgba(255,255,255,.92); color:#1c4650; font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:20px}
  .ph1{background:linear-gradient(120deg,#2b6e78,#0e2a33)}
  .ph2{background:linear-gradient(120deg,#3f7d86,#15323b)}
  .ph3{background:linear-gradient(120deg,#5a7f6a,#123027)}
  .ph4{background:linear-gradient(120deg,#5b6f86,#141f2e)}
  .card .body{padding:10px 12px 12px}
  .card .title{font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:600; color:var(--ink); line-height:1.15}
  .card .price{color:var(--brass); font-weight:700; font-size:14px; margin:3px 0 5px}
  .card .specs{font-size:12px; color:var(--mute)}

  /* chips + input */
  .foot{border-top:1px solid var(--line); background:var(--paper); padding:10px 12px 12px}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px}
  .chip{
    background:#fff; border:1px solid var(--brass); color:#8a6a34; font-family:inherit;
    font-size:12.5px; font-weight:500; padding:8px 13px; border-radius:20px; cursor:pointer; transition:.16s;
  }
  .chip:hover{background:var(--brass); color:#241703}
  .chip.primary{background:var(--sea2); border-color:var(--sea2); color:#fff}
  .chip.primary:hover{background:var(--deep)}
  .inbar{display:flex; gap:8px; align-items:center}
  .inbar input{
    flex:1; border:1px solid var(--line); background:#fff; border-radius:22px; padding:11px 15px;
    font-family:inherit; font-size:14px; color:var(--ink); outline:none;
  }
  .inbar input:focus{border-color:var(--teal)}
  .send{
    width:42px; height:42px; flex:0 0 42px; border:none; border-radius:50%; cursor:pointer;
    background:linear-gradient(150deg,var(--brass-lt),var(--brass)); color:#241703; font-size:17px;
    display:flex; align-items:center; justify-content:center; transition:.16s;
  }
  .send:hover{filter:brightness(1.06)}
  .reset{position:absolute; bottom:14px; left:16px; background:none; border:none; color:#9fb6b8; font-size:11px; cursor:pointer; z-index:2}
  .credit{text-align:center; color:#cfe0df; font-size:11px; margin-top:12px; letter-spacing:.05em; opacity:.8}
  .credit b{color:#fff}
</style>
</head>

let lang='en';
// --- Make (Integromat) live AI connection ---
const MAKE_WEBHOOK = "https://hook.eu1.make.com/wi6k3tpg99x685ob720dmtnv5wcl4zw5";
let history = [];
const msgs=document.getElementById('msgs'), chipsEl=document.getElementById('chips');
const input=document.getElementById('input'), sendBtn=document.getElementById('send');
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const now=()=>{const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')};

function scroll(){msgs.scrollTop=msgs.scrollHeight}
function addUser(t){
  const m=document.createElement('div'); m.className='m me';
  m.innerHTML='<div><div class="bubble"></div><div class="time">'+now()+'</div></div>';
  m.querySelector('.bubble').textContent=t; msgs.appendChild(m); scroll();
}
function typing(){
  const m=document.createElement('div'); m.className='m bot typing';
  m.innerHTML='<div class="bubble"><span></span><span></span><span></span></div>';
  msgs.appendChild(m); scroll(); return m;
}
function addBot(t){
  const m=document.createElement('div'); m.className='m bot';
  m.innerHTML='<div><div class="bubble"></div><div class="time">'+now()+'</div></div>';
  m.querySelector('.bubble').textContent=t; msgs.appendChild(m); scroll();
}
function addCard(key){
  const invest = key.endsWith('$'); const k = invest?key.slice(0,-1):key;
  const t=TITLE[k], spec=SPEC[lang][k];
  const c=document.createElement('div'); c.className='card';
  c.innerHTML=
    '<div class="photo '+PH[k]+'">'+(invest?'<div class="tag">'+YIELD[lang]+'</div>':'')+'<div class="area">'+t.area+'</div></div>'+
    '<div class="body"><div class="title">'+t.title+'</div><div class="price">'+t.price+'</div><div class="specs">'+spec+'</div></div>';
  msgs.appendChild(c); scroll();
}
function renderChips(list){
  chipsEl.innerHTML='';
  (list||[]).forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+(c[2]?' '+c[2]:'');
    b.textContent=c[0]; b.onclick=()=>choose(c[0],c[1]);
    chipsEl.appendChild(b);
  });
}
let busy=false;
async function go(nodeId){
  const node=FLOW[lang].nodes[nodeId]; if(!node) return;
  busy=true; renderChips([]);
  const seq=[...(node.bot||[])];
  for(const line of seq){ const tp=typing(); await wait(650+Math.random()*450); tp.remove(); addBot(line); await wait(180); }
  if(node.cards){ await wait(150); for(const ck of node.cards){ addCard(ck); await wait(140);} }
  if(node.after){ const tp=typing(); await wait(600); tp.remove(); addBot(node.after); }
  renderChips(node.chips); busy=false;
}
async function choose(label,next){
  if(busy) return; addUser(label); await wait(120); go(next);
}
const bookLabel=()=>'📞 '+(lang==='ru'?'Звонок с Лаурой':lang==='de'?'Termin mit Laura':lang==='me'?'Poziv sa Laurom':'Book a call with Laura');
async function sendToMake(text){
  const res = await fetch(MAKE_WEBHOOK, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ message:text, lang:lang, history:history })
  });
  const raw = await res.text();
  let reply = raw;
  try { const j = JSON.parse(raw); reply = j.reply || j.text || j.message || j.answer || raw; } catch(e){}
  return (reply||'').toString().trim();
}
function freeText(){
  const v=input.value.trim(); if(!v||busy) return; input.value='';
  addUser(v); history.push({role:'user',content:v});
  (async()=>{
    busy=true; renderChips([]); const tp=typing();
    try{
      const reply = await sendToMake(v);
      tp.remove();
      if(reply){ addBot(reply); history.push({role:'assistant',content:reply}); }
      else { addBot(FLOW[lang].ui.nudge); }
    }catch(err){
      tp.remove(); addBot(FLOW[lang].ui.nudge);
      console.error('Make webhook error:', err);
    }
    busy=false;
    renderChips([[bookLabel(),'book','primary']]);
  })();
}
function reset(){ history=[]; msgs.innerHTML=''; input.placeholder=FLOW[lang].ui.ph; document.getElementById('statusTxt').textContent=FLOW[lang].ui.status; go('greet'); }
function setLang(l){ lang=l; [...document.querySelectorAll('#langs button')].forEach(b=>b.classList.toggle('on',b.dataset.l===l)); reset(); }

document.getElementById('langs').addEventListener('click',e=>{ if(e.target.dataset.l) setLang(e.target.dataset.l); });
sendBtn.onclick=freeText;
input.addEventListener('keydown',e=>{ if(e.key==='Enter') freeText(); });
// live clock
setInterval(()=>{document.getElementById('clock').textContent=now()},1000);
document.getElementById('clock').textContent=now();
// start
reset();
</script>
</body>
</html>
